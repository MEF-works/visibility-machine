version: '3.8'

services:
  visibility-machine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visibility-machine
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - prod-ops-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.visibility-machine.rule=Host(`visibility.pluginops.pro`)"
      - "traefik.http.routers.visibility-machine.entrypoints=websecure"
      - "traefik.http.routers.visibility-machine.tls.certresolver=le"
      - "traefik.http.services.visibility-machine.loadbalancer.server.port=3000"
      - "traefik.docker.network=prod-ops-network"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  prod-ops-network:
    external: true
